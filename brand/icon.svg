<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0054a6"/>
      <stop offset="100%" stop-color="#003d7a"/>
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect width="256" height="256" rx="48" ry="48" fill="url(#bg)"/>
  <!-- Router body -->
  <rect x="48" y="132" width="160" height="64" rx="12" ry="12" fill="#ffffff"/>
  <!-- LED indicators -->
  <circle cx="80" cy="164" r="8" fill="#4caf50"/>
  <circle cx="108" cy="164" r="8" fill="#4caf50"/>
  <circle cx="136" cy="164" r="8" fill="#698cce"/>
  <circle cx="164" cy="164" r="8" fill="#698cce"/>
