  <line x1="128" y1="132" x2="128" y2="80" stroke="#ffffff" stroke-width="6" stroke-linecap="round"/>
  <!-- Signal arcs -->
  <path d="M 98 90 A 38 38 0 0 1 158 90" fill="none" stroke="#ffffff" stroke-width="5" stroke-linecap="round" opacity="0.9"/>
  <path d="M 80 72 A 58 58 0 0 1 176 72" fill="none" stroke="#ffffff" stroke-width="5" stroke-linecap="round" opacity="0.6"/>
  <path d="M 62 54 A 78 78 0 0 1 194 54" fill="none" stroke="#ffffff" stroke-width="5" stroke-linecap="round" opacity="0.35"/>
</svg>
